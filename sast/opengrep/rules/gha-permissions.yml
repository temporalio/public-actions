rules:
  - id: security.gha.missing-explicit-permissions
    languages:
      - yaml
    severity: ERROR
    message: >
      No explicit `GITHUB_TOKEN` permissions found at the workflow or job level.
      Add a `permissions:` block at the workflow root (applies to all jobs) or
      per job with least privilege (e.g., `contents: read` and only specific
      writes like `pull-requests: write` if needed).
    metadata:
      source: sast/opengrep/rules/gha-permissions.yml
    patterns:
      - pattern-inside: |
          jobs:
            ...
      - pattern-inside: |-
          runs-on: ...
          ...
      - pattern-not-inside: |
          ...
          permissions:
            $ACTIONS: ...
          ...
      - pattern-not-inside: |
          ...
          permissions: ...
          ...
    paths:
      include:
        - .github/workflows/**
